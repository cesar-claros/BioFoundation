tag: LuMamba_finetune
model_size: tiny
gpus: 1
num_nodes: 1
num_workers: 32
batch_size: 512

training: True
final_validate: True
final_test: True
finetune_pretrained: True
resume: False

layerwise_lr_decay: 0.75
scheduler_type: cosine
classification_type: "bc"
# Change for different tasks: "mcc" for multi-class classification and regression tasks, "bc" for binary classification.

pretrained_checkpoint_path: null
# Pretrained LuMamba variant to finetune from. All four downloaded checkpoints (under
# ${CHECKPOINT_DIR}/LuMamba) are registered below; pick one with `pretrained_variant=<name>`
# on the CLI. Default is mixed_300 (LeJEPA + reconstruction, 300 slices).
#   reconstruction_only : masked-reconstruction pretraining only
#   lejepa_only_128     : LeJEPA pretraining only, 128 slices
#   mixed_128           : LeJEPA + reconstruction, 128 slices
#   mixed_300           : LeJEPA + reconstruction, 300 slices
pretrained_variant: mixed_300
_pretrained_paths:
  reconstruction_only: ${env:CHECKPOINT_DIR}/LuMamba/LuMamba_ReconstructionOnly.safetensors
  lejepa_only_128: ${env:CHECKPOINT_DIR}/LuMamba/LuMamba_LeJEPAOnly_128slices.safetensors
  mixed_128: ${env:CHECKPOINT_DIR}/LuMamba/LuMamba_LeJEPA_reconstruction_128slices.safetensors
  mixed_300: ${env:CHECKPOINT_DIR}/LuMamba/LuMamba_LeJEPA_reconstruction_300slices.safetensors
pretrained_safetensors_path: ${_pretrained_paths.${pretrained_variant}}

callbacks:
  progress_bar:
    _target_: 'pytorch_lightning.callbacks.TQDMProgressBar'
    refresh_rate: 50
  early_stopping:
    _target_: 'pytorch_lightning.callbacks.EarlyStopping'
    monitor: 'val_loss'
    patience: 15
    mode: 'min'
    verbose: True


input_normalization:
  normalize: True

finetuning:
  freeze_layers: False

io:
  checkpoint_dirpath: ${env:CHECKPOINT_DIR}/checkpoints
  version: ${tag}_${model_size}_finetune
  base_output_path: "${env:CHECKPOINT_DIR}/logs"

defaults:
  - override /data_module: finetune_data_module 
  - override /model: LuMamba_tiny
  - override /scheduler: cosine
  - override /task: finetune_task_LUNA # binary classification (epilepsy vs no-epilepsy); use finetune_regression_task_LuMamba for regression
  - override /criterion: finetune_criterion

# TUEP HDF5s from make_datasets/process_tuep_eeg.py. num_channels=20 is REQUIRED: the X
# arrays are the 20 non-ear TCP bipolar channels (CHN_ORDER[:20]); leaving it null makes
# TUH_Dataset build 22 channel embeddings against 20-channel data and mismatch.
data_module:
  train:
    _target_: 'datasets.tuh_dataset.TUH_Dataset'
    hdf5_file: '/work/cniel/sw/singularity_containers/tuh-eeg-epilepsy/BioFoundation/TUEP_data/train.h5'
    num_channels: 20
    finetune: True
  val:
    _target_: 'datasets.tuh_dataset.TUH_Dataset'
    hdf5_file: '/work/cniel/sw/singularity_containers/tuh-eeg-epilepsy/BioFoundation/TUEP_data/val.h5'
    num_channels: 20
    finetune: True
  test:
    _target_: 'datasets.tuh_dataset.TUH_Dataset'
    hdf5_file: '/work/cniel/sw/singularity_containers/tuh-eeg-epilepsy/BioFoundation/TUEP_data/test.h5'
    num_channels: 20
    finetune: True

model:
  num_classes: 2 # Change for corresponding finetuning dataset
  classification_type: ${classification_type} # Options: "mcc" for multi-class classification and regression, "bc" for binary classification.
  classifier_option: null  # Options: "mamba", "linear". "None" defaults to LUNA classifier.

trainer:
  enable_model_summary: True
  accelerator: gpu
  num_nodes: ${num_nodes}
  devices: ${gpus}
  strategy: ddp
  max_epochs: 50
  precision: bf16-mixed

model_checkpoint:
  save_last: True
  monitor: "val_loss"
  mode: "min"
  save_top_k: 1
  every_n_epochs: 1

optimizer:
  optim: 'AdamW'
  lr: 5.0e-4
  betas: [0.9, 0.999]
  weight_decay: 0.05
